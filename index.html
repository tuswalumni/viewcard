<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>บัตรสมาชิกดิจิทัล | สมาคมนักศึกษาเก่าสังคมสงเคราะห์ศาสตร์ มธ.</title><link rel="icon" type="image/png" href="https://img5.pic.in.th/file/secure-sv1/cropped_circle_image09cc9731529109e7.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; }
    .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    #memberCardCanvas { image-rendering: -webkit-optimize-contrast; max-width: 100%; height: auto; }
    .hidden { display: none; }
  </style>
</head>
<body class="p-4 flex items-center justify-center min-h-screen">

  <div id="loginSection" class="max-w-md w-full bg-white p-8 md:p-10 rounded-[2.5rem] shadow-2xl border border-slate-100 text-center animate-fadeIn relative">
    <a href="https://members.tuswalumni.com/" class="absolute top-8 left-8 text-slate-400 hover:text-indigo-600 flex items-center gap-1 text-xs font-bold"><i data-lucide="arrow-left" class="w-3 h-3"></i> กลับหน้าหลัก</a>
    <img src="https://img2.pic.in.th/cropped_circle_image4abd3ce094449065.png" class="w-24 h-24 mx-auto mb-6 mt-6 rounded-full shadow-lg border-4 border-white">
    <h1 class="text-2xl font-black text-slate-800 mb-2">บัตรสมาชิกดิจิทัล</h1>
    <p class="text-slate-500 text-sm mb-8 font-medium italic">สมาคมนักศึกษาเก่าสังคมสงเคราะห์ศาสตร์ มธ.</p>
    
    <div class="space-y-5">
      <div class="text-left">
        <label class="text-xs font-bold text-slate-400 ml-4 mb-2 block uppercase">เลขประจำตัวประชาชน (13 หลัก)</label>
        <input type="text" id="memberIdCard" maxlength="13" oninput="this.value = this.value.replace(/[^0-9]/g, '')" onkeydown="if(event.key==='Enter') checkMemberCard()" class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-center text-xl font-bold tracking-[0.15em] outline-none focus:border-indigo-500 shadow-inner">
      </div>
      <button onclick="checkMemberCard()" class="w-full bg-indigo-700 text-white py-4 rounded-2xl font-black text-lg shadow-xl hover:bg-indigo-800 flex items-center justify-center gap-3"><i data-lucide="search" class="w-5 h-5"></i> เข้าดูบัตรสมาชิก</button>
    </div>
  </div>

  <div id="cardSection" class="hidden max-w-xl w-full text-center animate-fadeIn p-4">
    <div class="bg-white/50 backdrop-blur-md p-2 rounded-[2rem] inline-flex items-center gap-3 px-6 mb-6 border shadow-sm"><i data-lucide="shield-check" class="text-emerald-500 w-5 h-5"></i><span class="text-slate-700 font-bold text-sm">ข้อมูลสมาชิกตรวจสอบถูกต้องเรียบร้อย</span></div>
    
    <div class="relative group">
      <canvas id="memberCardCanvas" width="600" height="350" class="w-full rounded-[2rem] shadow-[0_20px_50px_rgba(0,0,0,0.15)] border border-white mb-8"></canvas>
    </div>
    
    <div class="grid grid-cols-1 gap-4 max-w-sm mx-auto">
      <button onclick="downloadCard()" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black shadow-lg hover:bg-emerald-700 flex items-center justify-center gap-3"><i data-lucide="download"></i> บันทึกรูปภาพลงเครื่อง</button>
      <div class="flex gap-3">
        <button onclick="location.reload()" class="flex-1 bg-white text-slate-500 py-4 rounded-2xl font-bold hover:bg-slate-50 border flex items-center justify-center gap-2"><i data-lucide="refresh-ccw" class="w-4 h-4"></i> ค้นหาใหม่</button>
        <button onclick="location.href='https://members.tuswalumni.com/'" class="flex-1 bg-slate-800 text-white py-4 rounded-2xl font-bold hover:bg-slate-900 flex items-center justify-center gap-2"><i data-lucide="home" class="w-4 h-4"></i> หน้าหลัก</button>
      </div>
    </div>
  </div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbwBqeqG9yu5y-PCKjr5hbgevTuKVjS9oDNbDFCbhxwvj4GX4jDSNEk9tKyOh3qw-J2h/exec";
  async function callAPI(action, payload = {}) {
    const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action, payload }) });
    const data = await res.json(); if (!data.success) throw new Error(data.message); return data;
  }

  lucide.createIcons();

  function validateThaiId(id) {
    if (id.length !== 13) return false; let sum = 0;
    for (let i = 0; i < 12; i++) sum += parseInt(id[i]) * (13 - i);
    return ((11 - (sum % 11)) % 10) === parseInt(id[12]);
  }

  async function checkMemberCard() {
    const idCard = document.getElementById('memberIdCard').value.trim();
    if (!validateThaiId(idCard)) return Swal.fire({ icon: 'warning', title: 'เลขบัตรไม่ถูกต้อง', text: 'เลขประจำตัวประชาชนนี้ไม่ผ่านการตรวจสอบ', confirmButtonColor: '#4338ca' });

    Swal.fire({ title: 'กำลังตรวจสอบฐานข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
    try {
      const res = await callAPI('getMemberDataForCard', { idCard: idCard });
      Swal.close();
      document.getElementById('loginSection').classList.add('hidden');
      document.getElementById('cardSection').classList.remove('hidden');
      drawMemberCard(res.data);
      lucide.createIcons();
    } catch (err) { Swal.fire({ icon: 'error', title: 'ไม่พบข้อมูล', text: err.message, confirmButtonColor: '#4338ca' }); }
  }

  function drawMemberCard(m) {
    const canvas = document.getElementById('memberCardCanvas');
    const ctx = canvas.getContext('2d');

    function renderCard(logoImg) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const grad = ctx.createLinearGradient(0, 0, 600, 350);
        if (m.type === 'สามัญ') { grad.addColorStop(0, '#991b1b'); grad.addColorStop(1, '#450a0a'); } 
        else if (m.type === 'กิตติมศักดิ์') { grad.addColorStop(0, '#14532d'); grad.addColorStop(1, '#064e3b'); } 
        else { grad.addColorStop(0, '#1e1b4b'); grad.addColorStop(1, '#312e81'); }

        ctx.fillStyle = grad; ctx.beginPath(); ctx.roundRect(0, 0, 600, 350, 35); ctx.fill();
        ctx.beginPath(); ctx.strokeStyle="rgba(255,255,255,0.05)"; ctx.lineWidth=60; ctx.arc(600,350,220,0,Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.strokeStyle="rgba(255,255,255,0.03)"; ctx.lineWidth=1;
        for(let i=-100;i<800;i+=15){ctx.moveTo(i,0);ctx.lineTo(i+200,350);} ctx.stroke();

        if (logoImg && logoImg.complete && logoImg.naturalWidth > 0) {
            ctx.save(); ctx.beginPath(); ctx.arc(517,77,47,0,Math.PI*2); ctx.clip(); ctx.drawImage(logoImg,470,30,95,95); ctx.restore();
        } else {
            ctx.fillStyle="rgba(255,255,255,0.15)"; ctx.beginPath(); ctx.arc(517,77,47,0,Math.PI*2); ctx.fill();
            ctx.fillStyle="rgba(255,255,255,0.5)"; ctx.font="bold 12px Sarabun"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText("มธ.",517,77); ctx.textAlign="left"; ctx.textBaseline="top";
        }

        ctx.textBaseline="top"; ctx.fillStyle="white"; ctx.font="bold 22px Sarabun"; ctx.fillText("สมาคมนักศึกษาเก่าสังคมสงเคราะห์ศาสตร์ มธ.",35,45);
        ctx.font="13px Sarabun"; ctx.fillStyle="rgba(255,255,255,0.6)"; ctx.fillText("TU SOCIAL ADMINISTRATION ALUMNI ASSOCIATION",35,75);
        ctx.fillStyle="white"; ctx.font="38px Sarabun"; ctx.fillText(m.name,35,155);
        ctx.font="bold 64px Sarabun"; ctx.fillStyle=(m.type==='สมทบ')?"#f1f5f9":"#fbbf24"; ctx.fillText(m.id||'ID-ERROR',35,200);
        ctx.font="bold 20px Sarabun"; ctx.fillStyle="white"; ctx.fillText("ประเภท: "+m.type,35,288);
        ctx.font="15px Sarabun"; ctx.fillStyle="rgba(255,255,255,0.8)";
        const expDisplay=(m.type==='สามัญ'||m.type==='กิตติมศักดิ์')?'ตลอดชีพ':(m.expiry||'-');
        ctx.fillText("สถานะ: "+m.status+" | หมดอายุ: "+expDisplay,35,316);
    }
    renderCard(null);
    if (m.logoBase64) { const logo = new Image(); logo.onload = () => renderCard(logo); logo.src = m.logoBase64; }
  }

  function downloadCard() {
    const canvas = document.getElementById('memberCardCanvas');
    const link = document.createElement('a'); link.download = `TU_Alumni_Card_${new Date().getTime()}.png`; link.href = canvas.toDataURL('image/png', 1.0); link.click();
  }
</script>
</body>
</html>
