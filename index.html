<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>บัตรสมาชิกดิจิทัล — สมาคมนักศึกษาเก่าสังคมสงเคราะห์ศาสตร์ มธ.</title><link rel="icon" type="image/png" href="https://i.ibb.co/vxYZTPhj/cropped-circle-image.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Sarabun', sans-serif; 
      background-color: #f1f5f9; 
      background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
      background-size: 20px 20px;
    }
    .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    
    /* ปรับแต่ง Canvas ให้ดูคมชัดบนจอ Retina */
    #memberCardCanvas {
      image-rendering: -webkit-optimize-contrast;
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body class="p-4 flex items-center justify-center min-h-screen">

  <div id="loginSection" class="max-w-md w-full bg-white p-8 md:p-10 rounded-[2.5rem] shadow-2xl border border-slate-100 text-center animate-fadeIn relative">
    
    <a href="https://members.tuswalumni.com/" class="absolute top-8 left-8 text-slate-400 hover:text-indigo-600 transition-colors flex items-center gap-1 text-xs font-bold uppercase tracking-widest group">
       <i data-lucide="arrow-left" class="w-3 h-3 group-hover:-translate-x-1 transition-transform"></i> กลับหน้าหลัก
    </a>

    <img src="https://i.ibb.co/vxYZTPhj/cropped-circle-image.png" class="w-24 h-24 mx-auto mb-6 mt-6 rounded-full shadow-lg border-4 border-white" alt="Logo">
    <h1 class="text-2xl font-black text-slate-800 mb-2">บัตรสมาชิกดิจิทัล</h1>
    <p class="text-slate-500 text-sm mb-8 font-medium italic leading-relaxed">สมาคมนักศึกษาเก่าสังคมสงเคราะห์ศาสตร์ มธ.</p>
    
    <div class="space-y-5">
      <div class="text-left">
        <label class="text-xs font-bold text-slate-400 ml-4 mb-2 block uppercase tracking-widest">เลขประจำตัวประชาชน (13 หลัก)</label>
        <div class="relative">
          <input type="text" id="memberIdCard" maxlength="13" placeholder="0-0000-00000-00-0" 
                 onkeydown="if(event.key==='Enter') checkMemberCard()"
                 oninput="formatIdCardInput(this)"
                 class="w-full px-6 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-center text-xl font-bold tracking-[0.15em] outline-none focus:border-indigo-500 focus:bg-white transition-all shadow-inner placeholder:tracking-normal placeholder:text-slate-300">
        </div>
      </div>
      
      <button onclick="checkMemberCard()" class="w-full bg-indigo-700 text-white py-4 rounded-2xl font-black text-lg shadow-xl shadow-indigo-100 hover:bg-indigo-800 transform hover:-translate-y-0.5 active:translate-y-0 transition-all flex items-center justify-center gap-3">
        <i data-lucide="search" class="w-5 h-5"></i> เข้าดูบัตรสมาชิก
      </button>
    </div>
    
    <div class="mt-10 pt-6 border-t border-slate-50 text-[11px] text-slate-400 leading-relaxed">
      หากข้อมูลไม่ถูกต้อง หรือยังไม่เป็นสมาชิกสมบูรณ์ <br>
      กรุณาติดต่อแอดมินสมาคมฯ หรือ <a href="https://members.tuswalumni.com/" class="text-indigo-600 font-bold underline">คลิกสมัครที่นี่</a>
    </div>
  </div>

  <div id="cardSection" class="hidden max-w-xl w-full text-center animate-fadeIn p-4">
    <div class="bg-white/50 backdrop-blur-md p-2 rounded-[2rem] inline-flex items-center gap-3 px-6 mb-6 border border-white shadow-sm">
      <i data-lucide="shield-check" class="text-emerald-500 w-5 h-5"></i>
      <span class="text-slate-700 font-bold text-sm">ข้อมูลสมาชิกตรวจสอบถูกต้องเรียบร้อย</span>
    </div>
    
    <div class="relative group">
      <canvas id="memberCardCanvas" width="600" height="350" class="w-full rounded-[2rem] shadow-[0_20px_50px_rgba(0,0,0,0.15)] border border-white mb-8"></canvas>
      <div class="absolute inset-0 rounded-[2rem] ring-1 ring-inset ring-black/5 pointer-events-none"></div>
    </div>
    
    <div class="grid grid-cols-1 gap-4 max-w-sm mx-auto">
      <button onclick="downloadCard()" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black shadow-lg shadow-emerald-100 hover:bg-emerald-700 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-3">
         <i data-lucide="download"></i> บันทึกรูปภาพลงเครื่อง
      </button>
      
      <div class="flex gap-3">
        <button onclick="resetSearch()" class="flex-1 bg-white text-slate-500 py-4 rounded-2xl font-bold hover:bg-slate-50 transition border border-slate-200 flex items-center justify-center gap-2">
          <i data-lucide="refresh-ccw" class="w-4 h-4"></i> ค้นหาใหม่
        </button>
        <button onclick="location.href='https://members.tuswalumni.com/'" class="flex-1 bg-slate-800 text-white py-4 rounded-2xl font-bold hover:bg-slate-900 transition flex items-center justify-center gap-2">
          <i data-lucide="home" class="w-4 h-4"></i> หน้าหลัก
        </button>
      </div>
    </div>
    
    <p class="mt-8 text-slate-400 text-xs font-medium italic">
      * ท่านสามารถใช้บัตรนี้เพื่อแสดงตนและรับสิทธิประโยชน์จากสมาคมฯ
    </p>
  </div>

<script src="api-client.js"></script>
<script>
  // เริ่มต้นใช้งาน Icon
  lucide.createIcons();


  /**
   * Auto-format เลขบัตรเป็นรูปแบบ X-XXXX-XXXXX-XX-X (เฉพาะ display)
   */
  function formatIdCardInput(input) {
    // ดึงเฉพาะตัวเลข
    let digits = input.value.replace(/[^0-9]/g, '').substring(0, 13);
    input.value = digits; // เก็บแค่ตัวเลขจริงๆ ใน value
  }

  /**
   * ตรวจสอบ Checksum เลขบัตรประชาชน 13 หลัก (ตรวจสอบเบื้องต้น)
   */
  function validateThaiId(id) {
    if (id.length !== 13) return false;
    let sum = 0;
    for (let i = 0; i < 12; i++) sum += parseInt(id[i]) * (13 - i);
    const check = (11 - (sum % 11)) % 10;
    return check === parseInt(id[12]);
  }

  /**
   * ตรวจสอบข้อมูลสมาชิกจาก Server (เรียกผ่าน JSON API แทน google.script.run)
   */
  function checkMemberCard() {
    const idCard = document.getElementById('memberIdCard').value.trim();
    if (idCard.length !== 13 || isNaN(idCard)) {
      Swal.fire({ 
        icon: 'warning', 
        title: 'เลขบัตรไม่ถูกต้อง', 
        text: 'กรุณากรอกเลขประจำตัวประชาชนให้ครบ 13 หลัก (เฉพาะตัวเลข)', 
        confirmButtonColor: '#4338ca',
        customClass: { popup: 'rounded-[2rem]' }
      });
      return;
    }
    if (!validateThaiId(idCard)) {
      Swal.fire({
        icon: 'warning',
        title: 'เลขบัตรไม่ถูกต้อง',
        text: 'เลขประจำตัวประชาชนนี้ไม่ผ่านการตรวจสอบ กรุณาตรวจสอบและกรอกใหม่อีกครั้ง',
        confirmButtonColor: '#4338ca',
        customClass: { popup: 'rounded-[2rem]' }
      });
      return;
    }

    Swal.fire({ 
      title: 'กำลังตรวจสอบฐานข้อมูล...', 
      allowOutsideClick: false, 
      didOpen: () => Swal.showLoading() 
    });

    TUSW_API.call('getMemberDataForCard', { idCard: idCard })
      .then(function(member) {
        Swal.close();
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('cardSection').classList.remove('hidden');
        drawMemberCard(member);
        lucide.createIcons(); // อัปเดตไอคอนในหน้าใหม่
      })
      .catch(function(err) {
        Swal.fire({ 
          icon: 'error', 
          title: 'ไม่พบข้อมูล', 
          text: err.message, 
          confirmButtonColor: '#4338ca',
          customClass: { popup: 'rounded-[2rem]' }
        });
      });
  }

  /**
   * ฟังก์ชันวาดบัตรสมาชิกลงบน Canvas
   */
  function drawMemberCard(m) {
    const canvas = document.getElementById('memberCardCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    function renderCard(logoImg) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // พื้นหลัง Gradient ตามประเภท
        const grad = ctx.createLinearGradient(0, 0, 600, 350);
        if (m.type === 'สามัญ') {
            grad.addColorStop(0, '#991b1b'); grad.addColorStop(1, '#450a0a');
        } else if (m.type === 'กิตติมศักดิ์') {
            grad.addColorStop(0, '#14532d'); grad.addColorStop(1, '#064e3b');
        } else {
            grad.addColorStop(0, '#1e1b4b'); grad.addColorStop(1, '#312e81');
        }

        // วาดขอบมน
        const r=35, w=600, h=350;
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(r,0); ctx.lineTo(w-r,0); ctx.quadraticCurveTo(w,0,w,r);
        ctx.lineTo(w,h-r); ctx.quadraticCurveTo(w,h,w-r,h);
        ctx.lineTo(r,h); ctx.quadraticCurveTo(0,h,0,h-r);
        ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0); ctx.fill();

        // ลวดลาย Security
        ctx.beginPath(); ctx.strokeStyle="rgba(255,255,255,0.05)"; ctx.lineWidth=60;
        ctx.arc(600,350,220,0,Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.strokeStyle="rgba(255,255,255,0.03)"; ctx.lineWidth=1;
        for(let i=-100;i<800;i+=15){ctx.moveTo(i,0);ctx.lineTo(i+200,350);}
        ctx.stroke();

        // โลโก้หรือ placeholder
        if (logoImg && logoImg.complete && logoImg.naturalWidth > 0) {
            ctx.save();
            ctx.beginPath(); ctx.arc(517,77,47,0,Math.PI*2); ctx.clip();
            ctx.drawImage(logoImg,470,30,95,95); ctx.restore();
        } else {
            ctx.fillStyle="rgba(255,255,255,0.15)";
            ctx.beginPath(); ctx.arc(517,77,47,0,Math.PI*2); ctx.fill();
            ctx.fillStyle="rgba(255,255,255,0.5)";
            ctx.font="bold 12px Sarabun"; ctx.textAlign="center"; ctx.textBaseline="middle";
            ctx.fillText("มธ.",517,77); ctx.textAlign="left"; ctx.textBaseline="top";
        }

        // ข้อความ
        ctx.textBaseline="top"; ctx.fillStyle="white";
        ctx.font="bold 22px Sarabun";
        ctx.fillText("สมาคมนักศึกษาเก่าสังคมสงเคราะห์ศาสตร์ มธ.",35,45);
        ctx.font="13px Sarabun"; ctx.fillStyle="rgba(255,255,255,0.6)";
        ctx.fillText("TU SOCIAL ADMINISTRATION ALUMNI ASSOCIATION",35,75);
        ctx.fillStyle="white"; ctx.font="38px Sarabun";
        ctx.fillText(m.name,35,155);
        ctx.font="bold 64px Sarabun";
        ctx.fillStyle=(m.type==='สมทบ')?"#f1f5f9":"#fbbf24";
        ctx.fillText(m.id||'ID-ERROR',35,200);
        ctx.font="bold 20px Sarabun"; ctx.fillStyle="white";
        ctx.fillText("ประเภท: "+m.type,35,288);
        ctx.font="15px Sarabun"; ctx.fillStyle="rgba(255,255,255,0.8)";
        const expDisplay=(m.type==='สามัญ'||m.type==='กิตติมศักดิ์')?'ตลอดชีพ':(m.expiry||'-');
        ctx.fillText("สถานะ: "+m.status+" | หมดอายุ: "+expDisplay,35,316);
    }

    // วาดทันที (ไม่มีโลโก้ก่อน)
    renderCard(null);

    // ✅ ใช้ logoBase64 ที่ Server ส่งมา — ไม่ต้องโหลด URL ข้าม CORS
    if (m.logoBase64) {
        const logo = new Image();
        logo.onload = () => renderCard(logo);
        logo.src = m.logoBase64;
    }
  }


  /**
   * ดาวน์โหลด Canvas เป็นไฟล์รูปภาพ
   */
  function downloadCard() {
    const canvas = document.getElementById('memberCardCanvas');
    const link = document.createElement('a');
    link.download = `TU_Alumni_Card_${new Date().getTime()}.png`;
    link.href = canvas.toDataURL('image/png', 1.0);
    link.click();
  }

  /**
   * รีเซ็ตหน้าจอเพื่อค้นหาใหม่
   */
  function resetSearch() {
    document.getElementById('memberIdCard').value = '';
    document.getElementById('cardSection').classList.add('hidden');
    document.getElementById('loginSection').classList.remove('hidden');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
</html>
